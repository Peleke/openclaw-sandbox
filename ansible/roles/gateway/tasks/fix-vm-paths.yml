---
# Fix VM-specific paths in OpenClaw config
# The host config has macOS paths that don't work in the Linux VM

- name: Check if config file exists
  ansible.builtin.stat:
    path: "{{ user_home }}/.openclaw/openclaw.json"
  register: config_file

- name: Fix VM paths in config (if config exists)
  when: config_file.stat.exists
  block:
    - name: Read current config
      ansible.builtin.slurp:
        src: "{{ user_home }}/.openclaw/openclaw.json"
      register: config_content

    - name: Parse config
      ansible.builtin.set_fact:
        openclaw_config: "{{ config_content.content | b64decode | from_json }}"

    - name: Fix workspace path (macOS -> Linux)
      ansible.builtin.set_fact:
        openclaw_config: >-
          {{ openclaw_config | combine({
            'agents': openclaw_config.agents | default({}) | combine({
              'defaults': (openclaw_config.agents.defaults | default({})) | combine({
                'workspace': user_home + '/.openclaw/workspace'
              })
            })
          }, recursive=true) }}
      when: openclaw_config.agents.defaults.workspace is defined and '/Users/' in (openclaw_config.agents.defaults.workspace | default(''))

    - name: Set Telegram dmPolicy to pairing (secure default)
      ansible.builtin.set_fact:
        openclaw_config: >-
          {{ openclaw_config | combine({
            'channels': openclaw_config.channels | default({}) | combine({
              'telegram': (openclaw_config.channels.telegram | default({})) | combine({
                'dmPolicy': 'pairing'
              })
            })
          }, recursive=true) }}
      when: openclaw_config.channels.telegram is defined

    - name: Pre-seed Telegram allowFrom with owner ID (if provided)
      ansible.builtin.set_fact:
        openclaw_config: >-
          {{ openclaw_config | combine({
            'channels': openclaw_config.channels | default({}) | combine({
              'telegram': (openclaw_config.channels.telegram | default({})) | combine({
                'allowFrom': [telegram_user_id | string]
              })
            })
          }, recursive=true) }}
      when: >
        openclaw_config.channels.telegram is defined and
        telegram_user_id is defined and telegram_user_id | string | length > 0

    # When qortex is enabled, ensure memorySearch has required fields so the agent
    # sees memory_search / memory_get and uses the qortex MCP backend.
    # Inject full block if missing; otherwise merge/patch to add enabled + qortex.command.
    - name: Inject memorySearch for qortex backend (when qortex enabled and not already set)
      ansible.builtin.set_fact:
        openclaw_config: >-
          {{ openclaw_config | combine({
            'agents': openclaw_config.agents | default({}) | combine({
              'defaults': (openclaw_config.agents.defaults | default({})) | combine({
                'memorySearch': {
                  'enabled': true,
                  'provider': 'qortex',
                  'qortex': {
                    'command': 'qortex mcp-serve',
                    'feedback': true
                  }
                }
              })
            })
          }, recursive=true) }}
      when: >
        (qortex_enabled | default(false) | bool) and
        ((openclaw_config.agents.defaults | default({})).memorySearch is not defined)

    - name: Patch memorySearch when qortex enabled and config exists but missing key fields
      ansible.builtin.set_fact:
        _ms: "{{ (openclaw_config.agents.defaults | default({})).memorySearch | default({}) }}"
      when: >
        (qortex_enabled | default(false) | bool) and
        ((openclaw_config.agents.defaults | default({})).memorySearch is defined)

    - name: Merge enabled and qortex.command into memorySearch
      ansible.builtin.set_fact:
        openclaw_config: >-
          {{ openclaw_config | combine({
            'agents': openclaw_config.agents | default({}) | combine({
              'defaults': (openclaw_config.agents.defaults | default({})) | combine({
                'memorySearch': _ms | combine({
                  'enabled': true,
                  'qortex': (_ms.qortex | default({})) | combine({
                    'command': (_ms.qortex | default({})).command | default('qortex mcp-serve')
                  })
                })
              })
            })
          }, recursive=true) }}
      when: _ms is defined

    # Enable plugins listed in gateway_plugin_entries (data-driven, not hardcoded).
    # Without this, plugins are discovered but never loaded (layer 3 gate).
    - name: Enable configured plugins
      when: (gateway_plugin_entries | default([])) | length > 0
      ansible.builtin.set_fact:
        openclaw_config: >-
          {{ openclaw_config | combine({
            'plugins': (openclaw_config.plugins | default({})) | combine({
              'entries': ((openclaw_config.plugins | default({})).entries | default({})) | combine(
                dict(gateway_plugin_entries | product([{'enabled': true}]))
              )
            })
          }, recursive=true) }}

    # Allow all tools through the sandbox policy filter (layer 8 gate).
    # Without this, DEFAULT_TOOL_ALLOW in sandbox/constants.js kills all
    # plugin tools silently — only 15 core tools survive.
    # Gated behind sandbox_tool_allow_wildcard (default: true) so operators can opt out.
    - name: Set sandbox tool allow wildcard
      when: sandbox_tool_allow_wildcard | default(true) | bool
      ansible.builtin.set_fact:
        openclaw_config: >-
          {{ openclaw_config | combine({
            'tools': (openclaw_config.tools | default({})) | combine({
              'sandbox': ((openclaw_config.tools | default({})).sandbox | default({})) | combine({
                'tools': (((openclaw_config.tools | default({})).sandbox | default({})).tools | default({})) | combine({
                  'allow': ['*']
                })
              })
            })
          }, recursive=true) }}

    # When qortex is enabled, ensure memory tools are allowed (alsoAllow group:memory)
    # so the agent sees memory_search / memory_get even when tools.profile is messaging.
    - name: Add group:memory to tools.alsoAllow when qortex enabled
      ansible.builtin.set_fact:
        openclaw_config: >-
          {{ openclaw_config | combine({
            'tools': (openclaw_config.tools | default({})) | combine({
              'alsoAllow': ((openclaw_config.tools.alsoAllow | default([])) + ['group:memory']) | unique | list
            })
          }, recursive=true) }}
      when: qortex_enabled | default(false) | bool

    # When qortex is enabled, inject learning config so the bandit system
    # (selectViaQortex / observeRunOutcomes) is live.  Shares the same
    # qortex MCP connection that memorySearch uses — no extra process.
    - name: Inject learning config for qortex backend (when qortex enabled)
      ansible.builtin.set_fact:
        openclaw_config: >-
          {{ openclaw_config | combine({
            'learning': {
              'enabled': true,
              'phase': 'active',
              'tokenBudget': 8000,
              'baselineRate': 0.10,
              'minPulls': 5,
              'qortex': {
                'command': 'qortex mcp-serve'
              },
              'learnerName': 'openclaw'
            }
          }, recursive=true) }}
      when: qortex_enabled | default(false) | bool

    # Read qortex API key for auth header injection
    - name: Read qortex API key for gateway auth
      when: qortex_serve_enabled | default(false) | bool
      become: true
      ansible.builtin.slurp:
        src: /etc/openclaw/qortex-api-key
      register: _gw_qortex_api_key_file
      failed_when: false

    - name: Set qortex_api_key fact for gateway
      when: >
        (qortex_serve_enabled | default(false) | bool) and
        (_gw_qortex_api_key_file is defined) and
        (_gw_qortex_api_key_file.content is defined)
      ansible.builtin.set_fact:
        qortex_api_key: "{{ (_gw_qortex_api_key_file.content | b64decode).strip() }}"

    # When qortex Docker container is running, switch memorySearch and learning
    # to HTTP transport pointing at localhost:8400 (plain REST, no MCP).
    - name: Build qortex HTTP config for gateway
      ansible.builtin.set_fact:
        _qortex_http_cfg: >-
          {{ {'baseUrl': 'http://localhost:' ~ (qortex_serve_port | default(8400)) | string}
            | combine(
              {'headers': {'Authorization': 'Bearer ' ~ qortex_api_key}}
              if (qortex_api_key is defined and qortex_api_key | length > 0)
              else {}
            )
          }}
      when: >
        (qortex_serve_enabled | default(false) | bool) and
        (qortex_http_transport | default(true) | bool)

    - name: Switch memorySearch to HTTP transport (qortex REST)
      ansible.builtin.set_fact:
        openclaw_config: >-
          {{ openclaw_config | combine({
            'agents': openclaw_config.agents | default({}) | combine({
              'defaults': (openclaw_config.agents.defaults | default({})) | combine({
                'memorySearch': ((openclaw_config.agents.defaults | default({})).memorySearch | default({})) | combine({
                  'qortex': (((openclaw_config.agents.defaults | default({})).memorySearch | default({})).qortex | default({})) | combine({
                    'transport': 'http',
                    'http': _qortex_http_cfg
                  })
                })
              })
            })
          }, recursive=true) }}
      when: >
        (_qortex_http_cfg is defined) and
        ((openclaw_config.agents.defaults | default({})).memorySearch is defined)

    - name: Switch learning to HTTP transport (qortex REST)
      ansible.builtin.set_fact:
        openclaw_config: >-
          {{ openclaw_config | combine({
            'learning': (openclaw_config.learning | default({})) | combine({
              'qortex': ((openclaw_config.learning | default({})).qortex | default({})) | combine({
                'transport': 'http',
                'http': _qortex_http_cfg
              })
            })
          }, recursive=true) }}
      when: >
        (_qortex_http_cfg is defined) and
        (openclaw_config.learning is defined)

    # The gateway spawns `command` as a subprocess for MCP stdio transport.
    # When using HTTP transport (Docker container), the subprocess is wasteful
    # and conflicts with the REST endpoint.  Strip `command` so the gateway
    # talks to the Docker container over HTTP only.
    # NOTE: combine(recursive=true) cannot remove keys — it only adds/updates.
    # We must rebuild without `command` using dict2items | rejectattr | items2dict
    # and use NON-recursive combine so the old key doesn't leak back in.
    - name: Strip command from memorySearch.qortex (HTTP replaces subprocess)
      ansible.builtin.set_fact:
        openclaw_config: >-
          {{ openclaw_config | combine({
            'agents': (openclaw_config.agents | default({})) | combine({
              'defaults': ((openclaw_config.agents | default({})).defaults | default({})) | combine({
                'memorySearch': (((openclaw_config.agents | default({})).defaults | default({})).memorySearch | default({})) | combine({
                  'qortex': ((((openclaw_config.agents | default({})).defaults | default({})).memorySearch | default({})).qortex | default({}))
                    | dict2items | rejectattr('key', 'equalto', 'command') | items2dict
                })
              })
            })
          }) }}
      when: >
        (_qortex_http_cfg is defined) and
        ((((openclaw_config.agents | default({})).defaults | default({})).memorySearch | default({})).qortex | default({})).command is defined

    - name: Strip command from learning.qortex (HTTP replaces subprocess)
      ansible.builtin.set_fact:
        openclaw_config: >-
          {{ openclaw_config | combine({
            'learning': (openclaw_config.learning | default({})) | combine({
              'qortex': ((openclaw_config.learning | default({})).qortex | default({}))
                | dict2items | rejectattr('key', 'equalto', 'command') | items2dict
            })
          }) }}
      when: >
        (_qortex_http_cfg is defined) and
        ((openclaw_config.learning | default({})).qortex | default({})).command is defined

    # Ensure vault bind mount persists in sandbox config.
    # The sandbox role adds this during initial provisioning, but if the vault
    # overlay wasn't mounted yet or config was rewritten, re-add it here so
    # the agent can see the vault inside Docker sandbox containers.
    - name: Check if vault overlay is mounted
      ansible.builtin.stat:
        path: "{{ sandbox_vault_path | default('/workspace-obsidian') }}"
      register: vault_overlay_check

    - name: Ensure vault bind mount in sandbox docker config
      when: vault_overlay_check.stat.exists
      block:
        - name: Read existing sandbox config
          ansible.builtin.set_fact:
            _vault_bind: "{{ (sandbox_vault_path | default('/workspace-obsidian')) ~ ':' ~ (sandbox_vault_mount | default('/workspace/obsidian')) ~ ':' ~ (sandbox_vault_access | default('rw')) }}"
            _sandbox_cfg: "{{ ((openclaw_config.agents | default({})).defaults | default({})).sandbox | default({}) }}"

        - name: Add vault bind mount if not already present
          ansible.builtin.set_fact:
            openclaw_config: >-
              {{ openclaw_config | combine({
                'agents': (openclaw_config.agents | default({})) | combine({
                  'defaults': ((openclaw_config.agents | default({})).defaults | default({})) | combine({
                    'sandbox': _sandbox_cfg | combine({
                      'docker': (_sandbox_cfg.docker | default({})) | combine({
                        'binds': ((_sandbox_cfg.docker | default({})).binds | default([])) + [_vault_bind]
                      })
                    })
                  })
                })
              }, recursive=true) }}
          when: _vault_bind not in ((_sandbox_cfg.docker | default({})).binds | default([]))

    # Ensure source repo bind mount persists in sandbox config.
    - name: Check if OpenClaw source is mounted
      ansible.builtin.stat:
        path: "{{ sandbox_source_path | default('/mnt/openclaw') }}"
      register: source_mount_check

    - name: Ensure source repo bind mount in sandbox docker config
      when: source_mount_check.stat.exists
      block:
        - name: Read existing sandbox config for source bind
          ansible.builtin.set_fact:
            _source_bind: "{{ (sandbox_source_path | default('/mnt/openclaw')) ~ ':' ~ (sandbox_source_mount | default('/openclaw-source')) ~ ':' ~ (sandbox_source_access | default('ro')) }}"
            _sandbox_cfg_src: "{{ ((openclaw_config.agents | default({})).defaults | default({})).sandbox | default({}) }}"

        - name: Add source repo bind mount if not already present
          ansible.builtin.set_fact:
            openclaw_config: >-
              {{ openclaw_config | combine({
                'agents': (openclaw_config.agents | default({})) | combine({
                  'defaults': ((openclaw_config.agents | default({})).defaults | default({})) | combine({
                    'sandbox': _sandbox_cfg_src | combine({
                      'docker': (_sandbox_cfg_src.docker | default({})) | combine({
                        'binds': ((_sandbox_cfg_src.docker | default({})).binds | default([])) + [_source_bind]
                      })
                    })
                  })
                })
              }, recursive=true) }}
          when: _source_bind not in ((_sandbox_cfg_src.docker | default({})).binds | default([]))

    # Inject path discovery env vars so the agent knows what's mounted
    - name: Build discovery env vars
      ansible.builtin.set_fact:
        _discovery_env: >-
          {{ {}
            | combine({'OBSIDIAN_VAULT_PATH': sandbox_vault_mount | default('/workspace/obsidian')} if (vault_overlay_check.stat.exists | default(false)) else {})
            | combine({'OPENCLAW_SOURCE_PATH': sandbox_source_mount | default('/openclaw-source')} if (source_mount_check.stat.exists | default(false)) else {})
          }}

    - name: Merge discovery env vars into sandbox docker config
      when: _discovery_env | default({}) | length > 0
      ansible.builtin.set_fact:
        openclaw_config: >-
          {{ openclaw_config | combine({
            'agents': (openclaw_config.agents | default({})) | combine({
              'defaults': ((openclaw_config.agents | default({})).defaults | default({})) | combine({
                'sandbox': (((openclaw_config.agents | default({})).defaults | default({})).sandbox | default({})) | combine({
                  'docker': ((((openclaw_config.agents | default({})).defaults | default({})).sandbox | default({})).docker | default({})) | combine({
                    'env': (((((openclaw_config.agents | default({})).defaults | default({})).sandbox | default({})).docker | default({})).env | default({})) | combine(_discovery_env)
                  })
                })
              })
            })
          }, recursive=true) }}

    - name: Write fixed config
      ansible.builtin.copy:
        content: "{{ openclaw_config | to_nice_json }}"
        dest: "{{ user_home }}/.openclaw/openclaw.json"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0640"

    - name: Create workspace directory
      ansible.builtin.file:
        path: "{{ user_home }}/.openclaw/workspace"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    # Rewrite ALL macOS paths across ~/.openclaw/ — not just openclaw.json.
    # Config files copied from the host mount embed macOS-specific paths
    # (sessions.json, skills-extra, agent session data, etc.) that break
    # when the gateway tries to mkdir /Users/... inside the Linux VM.
    # Detects macOS home from /Users/* patterns in any file and rewrites
    # to the VM user's home directory.
    - name: Detect macOS home paths in config files
      ansible.builtin.shell: |
        grep -roh '/Users/[^/"'\'' ]*' "{{ user_home }}/.openclaw/" 2>/dev/null \
          | sort -u | head -1
      register: macos_home_detect
      changed_when: false
      failed_when: false

    - name: Rewrite macOS paths to VM paths across all config files
      when: macos_home_detect.stdout | default('') | length > 0
      ansible.builtin.shell: |
        MACOS_HOME="{{ macos_home_detect.stdout | trim }}"
        VM_HOME="{{ user_home }}"
        find "{{ user_home }}/.openclaw/" \
          -type f \( -name '*.json' -o -name '*.jsonl' -o -name '*.md' -o -name '*.env' -o -name '*.sh' \) \
          -exec grep -l "$MACOS_HOME" {} + 2>/dev/null \
          | while read -r file; do
              sed -i "s|${MACOS_HOME}/.openclaw|${VM_HOME}/.openclaw|g" "$file"
              sed -i "s|${MACOS_HOME}/Documents/Projects/openclaw|/workspace|g" "$file"
              sed -i "s|${MACOS_HOME}/Library/Mobile Documents/iCloud~md~obsidian/Documents/[^\"']*|/workspace-obsidian|g" "$file"
              sed -i "s|${MACOS_HOME}|${VM_HOME}|g" "$file"
            done
        echo "Rewrote macOS paths: ${MACOS_HOME} → ${VM_HOME}"
      register: path_rewrite_result
      changed_when: path_rewrite_result.rc == 0

    - name: Fix ownership after path rewrite
      ansible.builtin.shell: |
        chown -R "{{ ansible_user }}:{{ ansible_user }}" "{{ user_home }}/.openclaw/"
      changed_when: false

    - name: Display path fixes applied
      ansible.builtin.debug:
        msg: |
          Applied VM path fixes:
          - workspace: {{ user_home }}/.openclaw/workspace
          {% if (gateway_plugin_entries | default([])) | length > 0 %}
          - plugins enabled: {{ gateway_plugin_entries | join(', ') }}
          {% endif %}
          {% if sandbox_tool_allow_wildcard | default(true) | bool %}
          - sandbox tool allow: * (all tools pass through)
          {% else %}
          - sandbox tool allow: DEFAULT_TOOL_ALLOW (restrictive, 15 core tools)
          {% endif %}
          - dmPolicy: pairing (unknown senders get a pairing code)
          {% if telegram_user_id is defined and telegram_user_id | string | length > 0 %}
          - allowFrom: [{{ telegram_user_id }}] (pre-seeded owner)
          {% else %}
          - allowFrom: not pre-seeded (approve via: claw pair approve <code>)
          {% endif %}
          {% if vault_overlay_check.stat.exists | default(false) %}
          - vault bind: {{ sandbox_vault_path | default('/workspace-obsidian') }} -> {{ sandbox_vault_mount | default('/workspace/obsidian') }} (rw in sandbox containers)
          {% else %}
          - vault bind: skipped (no vault overlay at {{ sandbox_vault_path | default('/workspace-obsidian') }})
          {% endif %}
          {% if source_mount_check.stat.exists | default(false) %}
          - source bind: {{ sandbox_source_path | default('/mnt/openclaw') }} -> {{ sandbox_source_mount | default('/openclaw-source') }} (ro)
          {% else %}
          - source bind: skipped (no source at {{ sandbox_source_path | default('/mnt/openclaw') }})
          {% endif %}
          {% if _discovery_env | default({}) | length > 0 %}
          - discovery env: {{ _discovery_env | to_json }}
          {% endif %}
          {% if (qortex_serve_enabled | default(false) | bool) and (qortex_http_transport | default(true) | bool) %}
          - qortex transport: HTTP → http://localhost:{{ qortex_serve_port | default(8400) }} (REST, Docker container)
          {% else %}
          - qortex transport: stdio (subprocess)
          {% endif %}
