---
# Qortex Role
# Deploys qortex as a Docker container, sets up seed exchange dirs, and interop config.

# Get the actual user home directory
- name: Get user home directory
  ansible.builtin.shell: "getent passwd {{ ansible_user }} | cut -d: -f6"
  register: user_home_result
  changed_when: false

- name: Set user_home fact
  ansible.builtin.set_fact:
    user_home: "{{ user_home_result.stdout }}"

# ── Seed exchange directories ──────────────────────────────────────

- name: Create qortex seed directories
  ansible.builtin.file:
    path: "{{ user_home }}/.qortex/seeds/{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0750"
  loop:
    - pending
    - processed
    - failed

- name: Create qortex signals directory
  ansible.builtin.file:
    path: "{{ user_home }}/.qortex/signals"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0750"

# ── Buildlog interop ───────────────────────────────────────────────

# Ensure ~/.buildlog exists (guard for when buildlog role is disabled)
# Skip owner/group/mode to avoid chown failures on Lima mount symlinks
- name: Check if buildlog directory exists
  ansible.builtin.stat:
    path: "{{ user_home }}/.buildlog"
  register: buildlog_dir_check

- name: Create buildlog directory for interop config (if missing)
  when: not buildlog_dir_check.stat.exists
  ansible.builtin.file:
    path: "{{ user_home }}/.buildlog"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0750"

# Deploy interop.yaml (buildlog <-> qortex seed exchange config)
- name: Check if interop.yaml exists
  ansible.builtin.stat:
    path: "{{ user_home }}/.buildlog/interop.yaml"
  register: interop_config

- name: Deploy buildlog interop config
  when: not interop_config.stat.exists
  ansible.builtin.template:
    src: interop.yaml.j2
    dest: "{{ user_home }}/.buildlog/interop.yaml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0640"

# ── Observability environment ──────────────────────────────────────

- name: Deploy qortex OTEL profile.d script
  when: qortex_otel_enabled | default(false) | bool
  become: true
  ansible.builtin.template:
    src: qortex-otel.sh.j2
    dest: /etc/profile.d/qortex-otel.sh
    owner: root
    group: root
    mode: "0644"

- name: Deploy qortex OTEL env for systemd services
  when: qortex_otel_enabled | default(false) | bool
  become: true
  ansible.builtin.template:
    src: qortex-otel.env.j2
    dest: /etc/openclaw/qortex-otel.env
    owner: root
    group: root
    mode: "0644"

- name: Hook qortex OTEL into bash.bashrc for non-login shells
  when: qortex_otel_enabled | default(false) | bool
  become: true
  ansible.builtin.lineinfile:
    path: /etc/bash.bashrc
    line: '[ -r /etc/profile.d/qortex-otel.sh ] && . /etc/profile.d/qortex-otel.sh'
    insertafter: EOF
    state: present

# ── API key generation ─────────────────────────────────────────────

- name: Generate qortex API key (if not already present)
  when: qortex_serve_enabled | default(false) | bool
  become: true
  ansible.builtin.shell: openssl rand -hex 32 > /etc/openclaw/qortex-api-key
  args:
    creates: /etc/openclaw/qortex-api-key

- name: Set permissions on qortex API key file
  when: qortex_serve_enabled | default(false) | bool
  become: true
  ansible.builtin.file:
    path: /etc/openclaw/qortex-api-key
    owner: root
    group: root
    mode: "0640"

- name: Read qortex API key
  when: qortex_serve_enabled | default(false) | bool
  become: true
  ansible.builtin.slurp:
    src: /etc/openclaw/qortex-api-key
  register: _qortex_api_key_file

- name: Set qortex_api_keys fact from key file
  when: qortex_serve_enabled | default(false) | bool
  ansible.builtin.set_fact:
    qortex_api_keys: "{{ (_qortex_api_key_file.content | b64decode).strip() }}"

# ── Clean up old systemd services ──────────────────────────────────
# Previous provisioning deployed qortex via systemd + uv. Remove those
# so they don't conflict with the Docker container.

- name: Stop and disable old qortex systemd service
  become: true
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop:
    - qortex
    - qortex-mcp
  failed_when: false

- name: Remove old systemd unit files
  become: true
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ item }}"
    state: absent
  loop:
    - qortex.service
    - qortex-mcp.service
  notify:
    - Reload systemd

# ── Docker container deployment ────────────────────────────────────

- name: Deploy qortex environment file
  when: qortex_serve_enabled | default(false) | bool
  become: true
  ansible.builtin.template:
    src: qortex.env.j2
    dest: /etc/openclaw/qortex.env
    owner: root
    group: root
    mode: "0640"
  notify:
    - Restart qortex container

- name: Check if qortex Docker image exists locally
  when: qortex_serve_enabled | default(false) | bool
  become: true
  ansible.builtin.command:
    cmd: "docker image inspect {{ qortex_docker_image }}"
  register: _qortex_image_check
  failed_when: false
  changed_when: false

- name: Pull qortex Docker image (skipped if already loaded)
  when:
    - qortex_serve_enabled | default(false) | bool
    - _qortex_image_check.rc != 0
  become: true
  ansible.builtin.command:
    cmd: "docker pull {{ qortex_docker_image }}"
  register: docker_pull_result
  changed_when: "'Downloaded newer image' in (docker_pull_result.stdout | default('')) or 'Pull complete' in (docker_pull_result.stdout | default(''))"

- name: Create qortex data volume
  when: qortex_serve_enabled | default(false) | bool
  become: true
  ansible.builtin.command:
    cmd: "docker volume create {{ qortex_docker_volume }}"
  register: volume_create
  changed_when: false

- name: Stop and remove existing qortex container
  when: qortex_serve_enabled | default(false) | bool
  become: true
  ansible.builtin.command:
    cmd: "docker rm -f {{ qortex_docker_container }}"
  register: docker_rm
  failed_when: false
  changed_when: docker_rm.rc == 0

- name: Run qortex Docker container
  when: qortex_serve_enabled | default(false) | bool
  become: true
  ansible.builtin.command:
    cmd: >-
      docker run -d
      --name {{ qortex_docker_container }}
      --network host
      --restart unless-stopped
      --env-file /etc/openclaw/qortex.env
      -v {{ qortex_docker_volume }}:/data
      -e QORTEX_STATE_DIR=/data
      {{ qortex_docker_image }}
  register: docker_run
  changed_when: docker_run.rc == 0

- name: Wait for qortex health check
  when: qortex_serve_enabled | default(false) | bool
  ansible.builtin.uri:
    url: "http://localhost:{{ qortex_serve_port }}/v1/health"
    method: GET
    return_content: true
  register: health_check
  until: health_check.status == 200
  retries: 30
  delay: 5

# ── Optional CLI install ───────────────────────────────────────────
# Lightweight — just the CLI for ad-hoc commands (qortex status, qortex ingest).
# Not required for the Docker service.

- name: Check if uv is installed
  become: false
  ansible.builtin.command: "{{ user_home }}/.local/bin/uv --version"
  register: uv_check
  changed_when: false
  failed_when: false
  when: qortex_install_cli | default(false) | bool

- name: Install qortex CLI via uv
  become: false
  when:
    - qortex_install_cli | default(false) | bool
    - uv_check.rc is defined and uv_check.rc == 0
  ansible.builtin.shell: |
    {{ user_home }}/.local/bin/uv tool install --upgrade --prerelease=allow qortex[mcp,vec-sqlite,observability,nlp]
  environment:
    HOME: "{{ user_home }}"
  register: qortex_cli_install
  changed_when: "'Installed' in (qortex_cli_install.stdout | default(''))"
  failed_when: false

# ── Summary ────────────────────────────────────────────────────────

- name: Qortex setup complete
  ansible.builtin.debug:
    msg: |
      ════════════════════════════════════════════════════════
      Qortex configured!

      Seed exchange dirs:
        ~/.qortex/seeds/{pending,processed,failed}
        ~/.qortex/signals/

      Interop config: ~/.buildlog/interop.yaml
      {% if qortex_serve_enabled | default(false) | bool %}
      Docker container: {{ qortex_docker_container }}
      Image: {{ qortex_docker_image }}
      Network: host (localhost:{{ qortex_serve_port }})
      Data volume: {{ qortex_docker_volume }} → /data
      HTTP service: http://{{ qortex_serve_host }}:{{ qortex_serve_port }}
      Vec backend: {{ qortex_vec_backend | default('sqlite') }}
      Extraction: {{ qortex_extraction | default('spacy') }}
      {% if memgraph_enabled | default(false) | bool %}
      Graph: memgraph (bolt://localhost:{{ memgraph_bolt_port | default(7687) }})
      Teleportation: enabled
      Credit propagation: enabled
      {% else %}
      Graph: memory (in-process)
      {% endif %}
      {% endif %}
      {% if qortex_otel_enabled | default(false) | bool %}
      OTEL: enabled → {{ qortex_otel_endpoint }}
      {% endif %}
      ════════════════════════════════════════════════════════
