---
# Qortex Role Defaults

# Enable qortex seed exchange directories and interop config
qortex_enabled: true

# ── Docker deployment ─────────────────────────────────────────────
# Qortex runs as a Docker container inside the VM.
# The image has the embedding model (all-MiniLM-L6-v2), spaCy (en_core_web_sm),
# and full extraction pipeline baked in — no runtime downloads.
qortex_docker_image: "ghcr.io/peleke/qortex:latest"
qortex_docker_container: "qortex"

# Data volume — mounted at /root/.qortex inside the container.
# Persists sqlite DB, vec index, learning state across restarts.
qortex_docker_volume: "qortex_data"

# Install qortex CLI via uv (optional — for ad-hoc commands, not required for service)
qortex_install_cli: false

# ── Service configuration ─────────────────────────────────────────
qortex_serve_enabled: true
qortex_serve_port: 8400
qortex_serve_host: "0.0.0.0"

# Transport: gateway connects via plain HTTP REST (not MCP subprocess).
# Set automatically — the Docker container serves REST on qortex_serve_port.
qortex_http_transport: true

# Concept extraction strategy: spacy (default), llm, none
qortex_extraction: "spacy"

# Vector backend: sqlite (default) or pgvector
qortex_vec_backend: "sqlite"
qortex_pgvector_dsn: "postgresql://qortex:qortex@localhost:5432/qortex"

# Store backend: sqlite (default) or postgres
qortex_store: "sqlite"

# ── Authentication ─────────────────────────────────────────────────
# API authentication (comma-separated keys, or empty for no auth)
qortex_api_keys: ""
qortex_hmac_secret: ""

# ── Observability ──────────────────────────────────────────────────
qortex_otel_enabled: true
qortex_otel_endpoint: "http://host.lima.internal:4318"
qortex_otel_protocol: "http/protobuf"

# Prometheus metrics endpoint (exposed by qortex for Grafana scraping)
qortex_prometheus_enabled: true
qortex_prometheus_port: 9090

# ── DEPRECATED ─────────────────────────────────────────────────────
# MCP HTTP service is fully replaced by REST on qortex_serve_port.
qortex_mcp_enabled: false
qortex_mcp_port: 8401

# Legacy vars (kept for backward compat, unused by Docker deployment)
qortex_install: false
qortex_extras: ""
qortex_wheel_dir: ""
